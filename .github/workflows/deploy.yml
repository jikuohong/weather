- name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 确保 vars: | 下方的缩进对齐
          vars: |
            TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}
            TG_CHAT_ID=${{ vars.TG_CHAT_ID }}
            QWEATHER_KEY=${{ secrets.QWEATHER_KEY }}
            CAIYUN_TOKEN=${{ secrets.CAIYUN_TOKEN }}
